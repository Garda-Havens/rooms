<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GH Generator">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker registrato'))
        .catch(err => console.log('Service Worker fallito:', err));
    }
  </script>
  <title>Garda Havens – Generatore messaggi</title>

  <style>
    /* ─── Base ─────────────────────────────────────────────────────── */
    :root { font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial; }
    body  { margin:0; background:#f6f6f7; color:#111; }
    .wrap { max-width:980px; margin:0 auto; padding:18px; }

    /* ─── Cards ─────────────────────────────────────────────────────── */
    .card {
      background:#fff;
      border:1px solid #e6e6e8;
      border-radius:14px;
      padding:16px;
      box-shadow:0 1px 0 rgba(0,0,0,.03);
    }

    /* ─── Typography ─────────────────────────────────────────────────── */
    h1    { font-size:20px; margin:0 0 18px; }
    h2    { font-size:15px; font-weight:600; margin:0 0 10px; color:#444; text-transform:uppercase; letter-spacing:.04em; }
    .muted { color:#666; font-size:13px; }

    /* ─── Section blocks ─────────────────────────────────────────────── */
    .section { margin-bottom:20px; }
    .section:last-child { margin-bottom:0; }
    .section-divider {
      border:none;
      border-top:1px solid #ececf0;
      margin:20px 0;
    }

    /* ─── Grid helpers ───────────────────────────────────────────────── */
    .grid  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

    /* ─── Form elements ──────────────────────────────────────────────── */
    label { display:block; font-size:12px; color:#444; margin-bottom:6px; }
    input, select, textarea {
      width:100%; box-sizing:border-box; padding:10px;
      border-radius:10px; border:1px solid #d9d9dd;
      background:#fff; font-size:14px;
    }
    textarea { min-height:64px; resize:vertical; }

    /* ─── Room pills grid ─────────────────────────────────────────────── */
    .rooms {
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      align-items:stretch;
    }
    .pill {
      display:flex; align-items:center; gap:8px;
      padding:10px 12px;
      border:1px solid #d9d9dd; border-radius:10px;
      background:#fff; height:100%; box-sizing:border-box;
      cursor:pointer;
    }
    .pill input { width:auto; }
    .pill:has(input:checked) { border-color:#111; background:#f9f9fb; }

    /* ─── Multi-booking toggle ────────────────────────────────────────── */
    .toggle-pill {
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 16px;
      border:1px solid #d9d9dd; border-radius:10px;
      background:#fff; cursor:pointer;
    }
    .toggle-pill:has(input:checked) { border-color:#111; background:#f9f9fb; }
    .toggle-pill input { width:auto; }

    /* ─── Multi-guest per-room selectors ─────────────────────────────── */
    .multi-guest-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
      gap:10px;
      margin-top:10px;
    }
    .multi-guest-item {
      background:#fff; border:1px solid #e6e6e8;
      border-radius:10px; padding:10px;
    }
    .multi-guest-item label { font-size:12px; color:#444; margin-bottom:4px; }

    /* ─── Buttons & row ──────────────────────────────────────────────── */
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button {
      padding:10px 14px; border-radius:12px; border:1px solid #d9d9dd;
      background:#111; color:#fff; font-size:14px; cursor:pointer;
    }
    button.secondary { background:#fff; color:#111; }

    /* ─── Status / tags ──────────────────────────────────────────────── */
    .tag  { font-size:12px; color:#444; background:#f0f0f3; padding:4px 8px; border-radius:999px; }
    .ok   { color:#0a7a2f; }
    .warn { color:#a15a00; }

    /* ─── Output area ────────────────────────────────────────────────── */
    .out { white-space:pre-wrap; background:#fbfbfc; border:1px solid #ececf0; border-radius:12px; padding:12px; font-size:13.5px; line-height:1.55; margin-top:10px; }
    .msgCard   { display:grid; grid-template-columns:1fr; gap:10px; }
    .msgHeader { display:flex; justify-content:space-between; align-items:center; gap:10px; padding-bottom:2px; }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width:760px) { .grid, .grid3 { grid-template-columns:1fr; } }
    @media (max-width:900px) { .rooms { grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (max-width:520px) { .rooms { grid-template-columns:1fr; } }
  </style>
</head>

<body>

  <!-- ── Access overlay ─────────────────────────────────────────────── -->
  <div id="accessOverlay" style="
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,1);
      display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div style="
        width:400px; max-width:90%; background:#fff;
        border:1px solid #e6e6e8; border-radius:14px; padding:20px;
        box-shadow:0 4px 12px rgba(0,0,0,.15);
        display:flex; flex-direction:column; align-items:center;">
      <h2 style="text-transform:none; letter-spacing:0; font-size:16px; margin-bottom:12px;">Accesso Privato</h2>
      <input id="accessCode" type="password" placeholder="Inserisci codice"
             style="padding:10px; font-size:16px; margin-bottom:12px; width:100%;">
      <button id="checkAccess" style="width:100%;">Accedi</button>
      <p class="muted" style="margin-top:8px;">Solo uso personale</p>
    </div>
  </div>

  <!-- ── Main app ───────────────────────────────────────────────────── -->
  <div class="wrap">
    <div class="card">
      <h1>Garda Havens – Generatore disponibilità</h1>

      <!-- STEP 1: Camere -->
      <div class="section">
        <h2>1 · Camere</h2>
        <div class="rooms" id="rooms"></div>
      </div>

      <hr class="section-divider">

      <!-- STEP 2: Ospiti & date -->
      <div class="section">
        <h2>2 · Ospiti &amp; Date</h2>

        <!-- Single vs multi mode toggle -->
        <div style="margin-bottom:10px;">
          <label class="toggle-pill">
            <input type="checkbox" id="multiBooking" />
            <span><strong>Gruppo multi-camera</strong> – ospiti divisi in più camere</span>
          </label>
        </div>

        <!-- Single mode: one guest selector -->
        <div id="singleGuestRow" class="grid">
          <div>
            <label>Numero ospiti</label>
            <select id="guests">
              <option value="1">1 ospite</option>
              <option value="2">2 ospiti</option>
              <option value="3" selected>3 ospiti</option>
              <option value="4">4 ospiti</option>
              <option value="5">5 ospiti</option>
              <option value="6">6 ospiti</option>
            </select>
          </div>
          <div>
            <label>Nome ospite (opzionale)</label>
            <input id="guestName" placeholder="es. Marco" />
          </div>
        </div>

        <!-- Multi mode: per-room selectors (rendered dynamically) -->
        <div id="multiGuestSection" style="display:none;">
          <div class="grid" style="margin-bottom:10px;">
            <div>
              <label>Nome ospite / gruppo (opzionale)</label>
              <input id="guestNameMulti" placeholder="es. Famiglia Rossi" />
            </div>
          </div>
          <div class="muted" style="margin-bottom:6px;">Seleziona quanti ospiti per ciascuna camera scelta:</div>
          <div class="multi-guest-grid" id="multiGuestsGrid"></div>
        </div>

        <!-- Dates -->
        <div class="grid" style="margin-top:14px;">
          <div>
            <label>Check-in</label>
            <input id="checkin" type="date" />
          </div>
          <div>
            <label>Check-out</label>
            <input id="checkout" type="date" />
          </div>
        </div>
      </div>

      <hr class="section-divider">

      <!-- STEP 3: Prezzi & sconti -->
      <div class="section">
        <h2>3 · Prezzi &amp; Sconti</h2>

        <div class="grid3">
          <div>
            <label>Sconto soggiorno lungo (€/notte)</label>
            <input id="discountPerNight" type="number" min="0" step="10" value="10" />
            <div class="muted" style="margin-top:5px;">Auto: ≥ 2 notti → 10€, altrimenti 0€</div>
          </div>
          <div>
            <label>Extra sconto</label>
            <select id="extraDiscountType">
              <option value="none" selected>Nessuno</option>
              <option value="bundle">Sconto prenotazione congiunta</option>
              <option value="custom">Sconto personalizzato</option>
            </select>
          </div>
          <div>
            <label>Importo sconto personalizzato (€/notte)</label>
            <input id="customDiscountPerNight" type="number" min="0" step="10" placeholder="es. 10" value="0" />
          </div>
        </div>
      </div>

      <hr class="section-divider">

      <!-- STEP 4: Preferenze messaggio -->
      <div class="section">
        <h2>4 · Preferenze messaggio</h2>

        <div class="grid3">
          <div>
            <label>Lingua output</label>
            <select id="langToggle">
              <option value="both">Italiano + English</option>
              <option value="it" selected>Solo Italiano</option>
              <option value="en">Solo English</option>
            </select>
          </div>
          <div>
            <label>Emoji (opzionale)</label>
            <input id="emoji" placeholder="es. 😊" value="😊" />
          </div>
          <div>
            <label>Firma</label>
            <input id="signature" value="Garda Havens" />
          </div>
        </div>

        <div style="margin-top:12px;">
          <label>Nota extra (opzionale)</label>
          <textarea id="extra"></textarea>
        </div>
      </div>

      <hr class="section-divider">

      <!-- Generate button -->
      <div class="row">
        <button id="generate">Genera messaggi</button>
        <span class="muted" id="summary"></span>
      </div>
    </div>

    <!-- ── Output card ──────────────────────────────────────────────── -->
    <div class="card" style="margin-top:14px;">
      <div class="msgHeader" style="margin-bottom:10px;">
        <h2 style="margin:0;">Output</h2>
        <span class="muted" id="priceHint"></span>
      </div>
      <div class="msgCard" id="outputs"></div>
    </div>

    <!-- ── Static snippets ─────────────────────────────────────────── -->
    <div class="card" style="margin-top:14px;">
      <h2>Messaggi rapidi</h2>
      <div class="msgCard" id="snippets"></div>
    </div>

  </div><!-- /wrap -->


<script>
/* ═══════════════════════════════════════════════════════════════════════
   0. ACCESS GATE
═══════════════════════════════════════════════════════════════════════ */
const ACCESS_KEY = "fimka8-pibsev-fohbEd";

if (localStorage.getItem("ghAccess") === ACCESS_KEY) {
  document.getElementById("accessOverlay").style.display = "none";
}

function checkAccess() {
  const val = document.getElementById("accessCode").value;
  if (val === ACCESS_KEY) {
    localStorage.setItem("ghAccess", ACCESS_KEY);
    document.getElementById("accessOverlay").style.display = "none";
  } else {
    alert("Codice errato ❌");
  }
}
document.getElementById("checkAccess").addEventListener("click", checkAccess);
document.getElementById("accessCode").addEventListener("keypress", e => { if (e.key === "Enter") checkAccess(); });


/* ═══════════════════════════════════════════════════════════════════════
   1. DATA
═══════════════════════════════════════════════════════════════════════ */
const ROOMS = [
  { id:1, name:"Room 1", type:"Quadruple", prices:{1:80,  2:90,  3:120, 4:150}              },
  { id:2, name:"Room 2", type:"Sestuple",  prices:{1:90,  2:100, 3:120, 4:150, 5:170, 6:190} },
  { id:3, name:"Room 3", type:"Quadruple", prices:{1:80,  2:90,  3:120, 4:150}              },
  { id:4, name:"Room 4", type:"Triple",    prices:{1:80,  2:90,  3:120}                     },
  { id:5, name:"Room 5", type:"Quadruple", prices:{1:80,  2:90,  3:120, 4:140}              },
  { id:6, name:"Room 6", type:"Quadruple", prices:{1:80,  2:90,  3:120, 4:140}              },
];


/* ═══════════════════════════════════════════════════════════════════════
   2. HELPERS
═══════════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function formatEuro(n) {
  const v = Math.round(Number(n) * 100) / 100;
  return "€" + v.toLocaleString("it-IT", {
    minimumFractionDigits: v % 1 ? 2 : 0,
    maximumFractionDigits: 2
  });
}

function formatDateIT(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-").map(Number);
  return `${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${y}`;
}
// EN date format: same dd/mm/yyyy for this property style
const formatDateEN = formatDateIT;

function isoToDate(iso) { return new Date(iso + "T00:00:00"); }

function nightsBetween(ci, co) {
  if (!ci || !co) return 0;
  return Math.max(0, Math.round((isoToDate(co) - isoToDate(ci)) / 86400000));
}

function pluralIT(n) { return n === 1 ? "notte" : "notti"; }
function pluralEN(n) { return n === 1 ? "night" : "nights"; }

function allSame(arr) { return arr.length === 0 || arr.every(x => x === arr[0]); }

function priceForRoom(roomId, guests) {
  const room = ROOMS.find(r => r.id === roomId);
  return room ? (room.prices[guests] ?? null) : null;
}

function getSelectedRooms() {
  return [...document.querySelectorAll('input[name="roomCheck"]:checked')]
    .map(c => Number(c.value));
}

function isMultiMode() { return $("multiBooking").checked; }

/** Returns per-room guest counts in multi mode; falls back to single value. */
function getRoomGuests(rooms) {
  if (!isMultiMode()) {
    const g = Number($("guests").value);
    return rooms.map(() => g);
  }
  return rooms.map(rid => {
    const el = $(`mgRoom_${rid}`);
    return el ? Number(el.value) : 1;
  });
}

function getGuestName() {
  return isMultiMode()
    ? $("guestNameMulti").value.trim()
    : $("guestName").value.trim();
}


/* ═══════════════════════════════════════════════════════════════════════
   3. DATE UTILS
═══════════════════════════════════════════════════════════════════════ */
function formatISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function setDefaultDates() {
  const today = new Date();
  const daysUntilSat = (6 - today.getDay() + 7) % 7 || 7;
  const sat = new Date(today); sat.setDate(today.getDate() + daysUntilSat);
  const sun = new Date(sat);  sun.setDate(sat.getDate() + 1);
  $("checkin").value  = formatISO(sat);
  $("checkout").value = formatISO(sun);
}

function autoSetCheckoutFromCheckin() {
  const ci = $("checkin").value;
  if (!ci) return;
  const d = new Date(ci + "T00:00:00"); d.setDate(d.getDate() + 1);
  $("checkout").value = formatISO(d);
}

function autoSetDiscount() {
  const n = nightsBetween($("checkin").value, $("checkout").value);
  $("discountPerNight").value = n >= 2 ? "10" : "0";
}


/* ═══════════════════════════════════════════════════════════════════════
   4. RENDER UI
═══════════════════════════════════════════════════════════════════════ */
function renderRooms() {
  const host = $("rooms");
  host.innerHTML = "";
  ROOMS.forEach(r => {
    const lbl = document.createElement("label");
    lbl.className = "pill";
    const minP = Math.min(...Object.values(r.prices));
    const maxP = Math.max(...Object.values(r.prices));
    lbl.innerHTML = `
      <input type="checkbox" name="roomCheck" value="${r.id}" />
      <div>
        <div><strong>Camera ${r.id}</strong> <span class="tag">${r.type}</span></div>
        <div class="muted" style="font-size:12px;">${formatEuro(minP)}–${formatEuro(maxP)}/notte</div>
      </div>`;
    lbl.querySelector("input").addEventListener("change", onRoomOrModeChange);
    host.appendChild(lbl);
  });
}

function renderMultiGuestSelectors(rooms) {
  const grid = $("multiGuestsGrid");
  grid.innerHTML = "";
  if (!rooms.length) {
    grid.innerHTML = `<div class="muted">Seleziona prima le camere.</div>`;
    return;
  }
  rooms.forEach(rid => {
    const room = ROOMS.find(r => r.id === rid);
    const maxG = Math.max(...Object.keys(room.prices).map(Number));
    const item = document.createElement("div");
    item.className = "multi-guest-item";
    let opts = "";
    for (let g = 1; g <= maxG; g++) {
      opts += `<option value="${g}">${g} ${g>1?"ospiti":"ospite"}</option>`;
    }
    item.innerHTML = `
      <label>Camera ${rid} <span class="tag" style="font-size:11px;">${room.type}</span></label>
      <select id="mgRoom_${rid}">${opts}</select>`;
    item.querySelector("select").addEventListener("change", buildOutputs);
    grid.appendChild(item);
  });
}

function syncModeUI() {
  const multi = isMultiMode();
  $("singleGuestRow").style.display  = multi ? "none" : "";
  $("multiGuestSection").style.display = multi ? "" : "none";
  if (multi) {
    renderMultiGuestSelectors(getSelectedRooms());
  }
}

function onRoomOrModeChange() {
  syncModeUI();
  buildOutputs();
}

function syncCustomDiscountUI() {
  const t = $("extraDiscountType").value;
  const inp = $("customDiscountPerNight");
  inp.disabled = t !== "custom";
  if (t !== "custom") inp.value = "0";
}


/* ═══════════════════════════════════════════════════════════════════════
   5. DISCOUNT LOGIC
═══════════════════════════════════════════════════════════════════════ */
function computeDiscounts(discountPerNight, extraDiscountType, customDiscountPerNight) {
  const BUNDLE = 10;
  const extra =
    extraDiscountType === "custom" ? Math.max(0, customDiscountPerNight) :
    extraDiscountType === "bundle" ? BUNDLE : 0;
  const longStay = Math.max(0, discountPerNight);
  const total = longStay + extra;

  const linesIT = [], linesEN = [];
  if (longStay > 0) {
    linesIT.push(`Sconto soggiorno lungo: ${formatEuro(longStay)} a notte`);
    linesEN.push(`Long-stay discount: ${formatEuro(longStay)} per night`);
  }
  if (extra > 0) {
    const lblIT = extraDiscountType === "bundle" ? "Sconto prenotazione congiunta" : "Sconto personalizzato";
    const lblEN = extraDiscountType === "bundle" ? "Joint booking discount" : "Custom discount";
    linesIT.push(`${lblIT}: ${formatEuro(extra)} a notte`);
    linesEN.push(`${lblEN}: ${formatEuro(extra)} per night`);
  }
  return {
    totalDiscountPerNight: total,
    discountLineIT: linesIT.join("\n"),
    discountLineEN: linesEN.join("\n"),
  };
}


/* ═══════════════════════════════════════════════════════════════════════
   6. MESSAGE BUILDERS
═══════════════════════════════════════════════════════════════════════ */

// ── 6a. Standard (single guest count across all rooms) ────────────────
function buildStandardMessages({ rooms, guests, nights, checkin, checkout, d, emoji, extra, signature }) {
  const prices   = rooms.map(rid => priceForRoom(rid, guests));
  const missing  = prices.some(p => p === null);
  const ci  = formatDateIT(checkin), co = formatDateIT(checkout);
  const ciE = formatDateEN(checkin), coE = formatDateEN(checkout);
  const roomsStr = rooms.slice().sort((a,b)=>a-b).join(", ");
  const discTotal = (!missing && d.totalDiscountPerNight > 0) ? d.totalDiscountPerNight * nights : 0;

  // Price lines
  const priceLineIT = missing
    ? "Tariffa: da verificare per questo numero di ospiti."
    : allSame(prices)
      ? `Prezzo: ${formatEuro(prices[0])} a notte`
      : `Prezzo per notte:\n${rooms.map((rid,i)=>`• Camera ${rid}: ${formatEuro(prices[i])}/notte`).join("\n")}`;

  const priceLineEN = missing
    ? "Rate: to be confirmed for this number of guests."
    : allSame(prices)
      ? `Rate: ${formatEuro(prices[0])} per night`
      : `Nightly rate:\n${rooms.map((rid,i)=>`• Room ${rid}: ${formatEuro(prices[i])}/night`).join("\n")}`;

  // Total lines
  function totalLine(lang) {
    if (missing) return "";
    const isIT   = lang === "it";
    const roomLbl = isIT ? "Camera" : "Room";

    if (allSame(prices)) {
      const full  = prices[0] * nights;
      const total = full - discTotal;
      return discTotal > 0
        ? (isIT ? `Totale ${formatEuro(total)} invece di ${formatEuro(full)}` : `Total: ${formatEuro(total)} instead of ${formatEuro(full)}`)
        : (isIT ? `Totale ${formatEuro(full)}` : `Total: ${formatEuro(full)}`);
    }
    const lines = rooms.map((rid,i) => {
      const full  = prices[i] * nights;
      const total = full - discTotal;
      return discTotal > 0
        ? `• ${roomLbl} ${rid}: ${formatEuro(total)} (invece di ${formatEuro(full)})`
        : `• ${roomLbl} ${rid}: ${formatEuro(full)}`;
    });
    return (isIT ? `Totale (${nights} ${pluralIT(nights)}):\n` : `Total (${nights} ${pluralEN(nights)}):\n`) + lines.join("\n");
  }

  const siteIT = "Puoi visitare www.gardahavens.com per consultare foto, listino prezzi e informazioni su biglietti convenzionati per le attrazioni locali.";
  const siteEN = "You can visit www.gardahavens.com to view photos, price list, and information about discounted tickets for local attractions.";

  const guestLabelIT = guests === 1 ? "1 ospite" : `${guests} ospiti`;
  const guestLabelEN = guests === 1 ? "1 guest" : `${guests} guests`;
  const roomLabelIT  = rooms.length === 1 ? `Camera n. ${roomsStr}` : `Camere n. ${roomsStr}`;
  const roomLabelEN  = rooms.length === 1 ? `Room no. ${roomsStr}` : `Rooms no. ${roomsStr}`;

  const formalIT = lines([
    "Buongiorno,",
    `confermiamo la disponibilità ${roomLabelIT} per ${guestLabelIT} nel periodo ${ci}–${co} (${nights} ${pluralIT(nights)})${emoji ? " "+emoji : ""}.`,
    priceLineIT,
    d.discountLineIT || null,
    totalLine("it") || null,
    "(esclusa tassa di soggiorno e bollo)",
    "Cancellazione gratuita, pagamento al check-in.",
    extra ? `Informazioni aggiuntive: ${extra}` : null,
    siteIT,
    signature
  ]);

  const formalEN = lines([
    "Good morning,",
    `we confirm the availability of ${roomLabelEN} for ${guestLabelEN} from ${ciE} to ${coE} (${nights} ${pluralEN(nights)})${emoji ? " "+emoji : ""}.`,
    priceLineEN,
    d.discountLineEN || null,
    totalLine("en") || null,
    "(city tax and stamp duty not included)",
    "Free cancellation, payment at check-in.",
    extra ? `Additional information: ${extra}` : null,
    siteEN,
    signature
  ]);

  const shortIT = [
    `Prenotazione confermata ✅ Camera ${roomsStr} per ${guestLabelIT}: ${ci}–${co} (${nights} ${pluralIT(nights)}).`,
    `Totale: vedi dettaglio offerta. Info: www.gardahavens.com${emoji ? " "+emoji : ""}`,
    signature
  ].join("\n");

  const shortEN = [
    `Booking confirmed ✅ Room ${roomsStr} for ${guestLabelEN}: ${ciE}–${coE} (${nights} ${pluralEN(nights)}).`,
    `Total: see offer details. Info: www.gardahavens.com${emoji ? " "+emoji : ""}`,
    signature
  ].join("\n");

  const priceHint = missing
    ? "⚠️ Alcune camere non hanno prezzo per quel numero di ospiti (controlla)."
    : allSame(prices)
      ? `Prezzo per ${guests} ospiti: ${formatEuro(prices[0])}/notte`
      : "Prezzi diversi tra camere selezionate";

  return { messages: [
    { title:"Offerta (IT)",        text:formalIT, lang:"it" },
    { title:"Offer (EN)",          text:formalEN, lang:"en" },
    { title:"Conferma (IT)",       text:shortIT,  lang:"it" },
    { title:"Confirmation (EN)",   text:shortEN,  lang:"en" },
  ], priceHint };
}

// ── 6b. Multi-room group (different guest count per room) ─────────────
function buildMultiMessages({ rooms, roomGuests, nights, checkin, checkout, d, emoji, extra, signature }) {
  const ci  = formatDateIT(checkin), co = formatDateIT(checkout);
  const ciE = formatDateEN(checkin), coE = formatDateEN(checkout);
  const roomsStr = rooms.slice().sort((a,b)=>a-b).join(", ");

  // Per-room data
  const roomData = rooms.map((rid, i) => {
    const g = roomGuests[i];
    const p = priceForRoom(rid, g);
    return { rid, g, p, missing: p === null };
  });

  const anyMissing = roomData.some(r => r.missing);
  const totalGuests = roomGuests.reduce((s, g) => s + g, 0);
  const discPerRoom = d.totalDiscountPerNight; // applied per room per night

  // Build per-room lines
  function roomLines(lang) {
    return roomData.map(({ rid, g, p, missing }) => {
      const full  = missing ? null : p * nights;
      const disc  = (!missing && discPerRoom > 0) ? discPerRoom * nights : 0;
      const total = missing ? null : full - disc;
      const gLabel = lang === "it"
        ? (g === 1 ? "1 ospite" : `${g} ospiti`)
        : (g === 1 ? "1 guest" : `${g} guests`);
      const priceStr = missing
        ? (lang === "it" ? "tariffa da verificare" : "rate to be confirmed")
        : disc > 0
          ? `${formatEuro(p)}/notte → ${formatEuro(total)} (invece di ${formatEuro(full)})`
          : `${formatEuro(p)}/notte → tot. ${formatEuro(full)}`;
      return lang === "it"
        ? `• Camera ${rid} (${gLabel}): ${priceStr}`
        : `• Room ${rid} (${gLabel}): ${priceStr}`;
    });
  }

  // Grand total
  function grandTotal() {
    if (anyMissing) return null;
    let fullSum = 0, discSum = 0;
    roomData.forEach(({ p }) => {
      fullSum += p * nights;
      discSum += discPerRoom * nights;
    });
    return { full: fullSum, total: fullSum - discSum, hasDisc: discSum > 0 };
  }

  const gt = grandTotal();

  const siteIT = "Puoi visitare www.gardahavens.com per consultare foto, listino prezzi e informazioni su biglietti convenzionati per le attrazioni locali.";
  const siteEN = "You can visit www.gardahavens.com to view photos, price list, and information about discounted tickets for local attractions.";

  const totalLineIT = gt
    ? gt.hasDisc
      ? `Totale complessivo: ${formatEuro(gt.total)} invece di ${formatEuro(gt.full)}`
      : `Totale complessivo: ${formatEuro(gt.full)}`
    : null;

  const totalLineEN = gt
    ? gt.hasDisc
      ? `Grand total: ${formatEuro(gt.total)} instead of ${formatEuro(gt.full)}`
      : `Grand total: ${formatEuro(gt.full)}`
    : null;

  const formalIT = lines([
    "Buongiorno,",
    `confermiamo la disponibilità delle Camere n. ${roomsStr} per il vostro gruppo (${totalGuests} ospiti in totale) nel periodo ${ci}–${co} (${nights} ${pluralIT(nights)})${emoji ? " "+emoji : ""}.`,
    "Dettaglio per camera:", ...roomLines("it"),
    d.discountLineIT || null,
    totalLineIT || null,
    "(esclusa tassa di soggiorno e bollo)",
    "Cancellazione gratuita, pagamento al check-in.",
    extra ? `Informazioni aggiuntive: ${extra}` : null,
    siteIT,
    signature
  ]);

  const formalEN = lines([
    "Good morning,",
    `we confirm the availability of Rooms no. ${roomsStr} for your group (${totalGuests} guests in total) from ${ciE} to ${coE} (${nights} ${pluralEN(nights)})${emoji ? " "+emoji : ""}.`,
    "Room breakdown:", ...roomLines("en"),
    d.discountLineEN || null,
    totalLineEN || null,
    "(city tax and stamp duty not included)",
    "Free cancellation, payment at check-in.",
    extra ? `Additional information: ${extra}` : null,
    siteEN,
    signature
  ]);

  const shortIT = [
    `Prenotazione confermata ✅ Camere ${roomsStr} – gruppo ${totalGuests} ospiti: ${ci}–${co} (${nights} ${pluralIT(nights)}).`,
    gt ? `Totale complessivo: ${formatEuro(gt.total ?? gt.full)}. Info: www.gardahavens.com${emoji ? " "+emoji : ""}` : `Totale: vedi offerta. Info: www.gardahavens.com${emoji ? " "+emoji : ""}`,
    signature
  ].join("\n");

  const shortEN = [
    `Booking confirmed ✅ Rooms ${roomsStr} – group ${totalGuests} guests: ${ciE}–${coE} (${nights} ${pluralEN(nights)}).`,
    gt ? `Grand total: ${formatEuro(gt.total ?? gt.full)}. Info: www.gardahavens.com${emoji ? " "+emoji : ""}` : `Total: see offer. Info: www.gardahavens.com${emoji ? " "+emoji : ""}`,
    signature
  ].join("\n");

  const priceHint = anyMissing
    ? "⚠️ Alcune camere non hanno prezzo per il numero di ospiti selezionato."
    : `Gruppo: ${totalGuests} ospiti totali in ${rooms.length} camere`;

  return { messages: [
    { title:"Offerta Gruppo (IT)",       text:formalIT, lang:"it" },
    { title:"Group Offer (EN)",          text:formalEN, lang:"en" },
    { title:"Conferma Gruppo (IT)",      text:shortIT,  lang:"it" },
    { title:"Group Confirmation (EN)",   text:shortEN,  lang:"en" },
  ], priceHint };
}

/** Filter null/undefined/empty-string, join with newline */
function lines(arr) {
  return arr.filter(l => l !== null && l !== undefined && l !== "").join("\n");
}


/* ═══════════════════════════════════════════════════════════════════════
   7. MAIN BUILD
═══════════════════════════════════════════════════════════════════════ */
function buildOutputs() {
  const rooms   = getSelectedRooms();
  const checkin = $("checkin").value;
  const checkout= $("checkout").value;
  const nights  = nightsBetween(checkin, checkout);
  const emoji   = $("emoji").value.trim();
  const signature = $("signature").value.trim() || "Garda Havens";
  const extra   = $("extra").value.trim();
  const lang    = $("langToggle").value;
  const discountPerNight       = Number($("discountPerNight").value || 0);
  const extraDiscountType      = $("extraDiscountType").value;
  const customDiscountPerNight = Number($("customDiscountPerNight").value || 0);

  // Validation
  if (!rooms.length) {
    $("summary").innerHTML = `<span class="warn">Seleziona almeno una camera.</span>`;
    $("outputs").innerHTML = "";
    $("priceHint").textContent = "";
    return;
  }
  if (!checkin || !checkout || nights <= 0) {
    $("summary").innerHTML = `<span class="warn">Inserisci date valide (check-out dopo check-in).</span>`;
    $("outputs").innerHTML = "";
    $("priceHint").textContent = "";
    return;
  }

  const d = computeDiscounts(discountPerNight, extraDiscountType, customDiscountPerNight);
  const roomGuests = getRoomGuests(rooms);
  const totalGuests = roomGuests.reduce((s,g)=>s+g,0);
  const multi = isMultiMode();

  const roomsStr = rooms.slice().sort((a,b)=>a-b).join(", ");
  $("summary").innerHTML = multi
    ? `<span class="ok">OK</span> · Camere: ${roomsStr} · ${roomGuests.join("+")} ospiti · ${nights} ${pluralIT(nights)}`
    : `<span class="ok">OK</span> · Camere: ${roomsStr} · ${roomGuests[0]} ospiti · ${nights} ${pluralIT(nights)}`;

  const params = { rooms, nights, checkin, checkout, d, emoji, extra, signature };
  const result = multi
    ? buildMultiMessages({ ...params, roomGuests })
    : buildStandardMessages({ ...params, guests: roomGuests[0] });

  $("priceHint").textContent = result.priceHint;

  const outputs = lang === "both"
    ? result.messages
    : result.messages.filter(o => o.lang === lang);

  renderOutputs(outputs);
}

function renderOutputs(outputs) {
  const host = $("outputs");
  host.innerHTML = "";
  outputs.forEach((o, idx) => {
    const box = document.createElement("div");
    box.className = "card";
    box.style.padding = "12px";
    box.innerHTML = `
      <div class="msgHeader">
        <strong>${o.title}</strong>
        <button class="secondary" data-copy="${idx}">Copia</button>
      </div>
      <div class="out" id="out_${idx}"></div>`;
    host.appendChild(box);
    $(`out_${idx}`).textContent = o.text;
  });

  [...document.querySelectorAll("button[data-copy]")].forEach(btn => {
    btn.onclick = async () => {
      const idx = btn.getAttribute("data-copy");
      const t = $(`out_${idx}`).textContent;
      try { await navigator.clipboard.writeText(t); }
      catch {
        const ta = Object.assign(document.createElement("textarea"), { value:t });
        document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      }
      btn.textContent = "Copiato ✓";
      setTimeout(() => btn.textContent = "Copia", 900);
    };
  });
}
